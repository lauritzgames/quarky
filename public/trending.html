<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarky - Trending</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <header class="site-header">
        <a class="brand" href="/">Quarky</a>
        <nav class="top-nav">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/trending">Trending</a>
            <a id="admin-link" class="nav-hidden" href="/admin" hidden>Admin</a>
            <a id="auth-link" href="/login">Login</a>
        </nav>
        <button id="mode-toggle" class="mode-toggle" aria-label="Toggle color mode">Mode</button>
    </header>

    <div id="announcement-banner" class="announcement-banner" hidden></div>

    <main class="page-shell page-shell-wide">
        <section class="page-intro">
            <p class="eyebrow">Trending</p>
            <h1>What people are opening right now</h1>
            <p>See the projects gaining traction from views, downloads, favorites, comments, and fresh updates.</p>
        </section>

        <section class="panel section-panel">
            <div id="trending-list" class="card-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <span>&copy; 2026 Quarky</span>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </div>
    </footer>

    <script src="/site.js"></script>
</body>
</html>
