<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarky - User</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <header class="site-header">
        <a class="brand" href="/">Quarky</a>
        <nav class="top-nav">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/trending">Trending</a>
            <a id="admin-link" class="nav-hidden" href="/admin" hidden>Admin</a>
            <a id="auth-link" href="/login">Login</a>
        </nav>
        <button id="mode-toggle" class="mode-toggle" aria-label="Toggle color mode">Mode</button>
    </header>

    <div id="announcement-banner" class="announcement-banner" hidden></div>

    <main class="page-shell page-shell-wide">
        <section class="profile-hero">
            <div class="profile-banner-shell">
                <img id="user-banner-display" class="banner-image" src="" alt="" hidden>
            </div>
            <div class="profile-hero-body">
                <img id="user-avatar-display" class="avatar avatar-lg" src="" alt="" hidden>
                <div class="profile-hero-copy">
                    <p class="eyebrow">Public profile</p>
                    <h1 id="user-display-username">User</h1>
                    <p id="user-display-bio">This creator has not added a bio yet.</p>
                    <div class="chip-row">
                        <span class="status-chip status-chip-muted" id="user-project-count-chip">0 public projects</span>
                        <span class="status-chip status-chip-muted" id="user-followers-chip">0 followers</span>
                        <span class="status-chip status-chip-muted" id="user-following-chip">0 following</span>
                    </div>
                    <div id="user-badges" class="chip-row"></div>
                    <div class="button-row">
                        <button id="user-follow-button" class="btn" type="button">Follow</button>
                    </div>
                    <p id="user-message" class="helper-text"></p>
                </div>
            </div>
        </section>

        <section class="panel section-panel">
            <div class="section-header">
                <div>
                    <p class="eyebrow">Public work</p>
                    <h2>Projects</h2>
                </div>
            </div>
            <div id="user-projects" class="card-grid"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <span>&copy; 2026 Quarky</span>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </div>
    </footer>

    <script src="/site.js"></script>
</body>
</html>
