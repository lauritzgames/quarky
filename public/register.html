<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarky - Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <header class="site-header">
        <a class="brand" href="/">Quarky</a>
        <nav class="top-nav">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a id="admin-link" class="nav-hidden" href="/admin" hidden>Admin</a>
            <a id="auth-link" href="/login">Login</a>
        </nav>
        <button id="mode-toggle" class="mode-toggle" aria-label="Toggle color mode">Mode</button>
    </header>

    <div id="announcement-banner" class="announcement-banner" hidden></div>

    <main class="page-shell">
        <section class="auth-card">
            <p class="eyebrow">New account</p>
            <h1>Register</h1>
            <form id="register-form" class="stack-form">
                <label for="register-username">Username</label>
                <input id="register-username" name="username" type="text" placeholder="Choose username" required>
                <label for="register-email">Email</label>
                <input id="register-email" name="email" type="email" placeholder="Enter email" required>
                <label for="register-password">Password</label>
                <input id="register-password" name="password" type="password" placeholder="Create password" required>
                <div id="register-invite-group" hidden>
                    <label for="register-invite-code">Invite code</label>
                    <input id="register-invite-code" name="inviteCode" type="text" placeholder="Enter invite code">
                </div>
                <div id="register-captcha-shell" class="captcha-shell" hidden>
                    <label for="register-captcha">Security check</label>
                    <div id="register-captcha" class="captcha-slot"></div>
                </div>
                <button type="submit" class="btn btn-block">Create Account</button>
            </form>
            <p id="register-message" class="helper-text"></p>
            <p id="register-helper" class="helper-text">Already registered? <a href="/login">Login</a></p>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <span>&copy; 2026 Quarky</span>
            <a href="/privacy">Privacy</a>
            <a href="/terms">Terms</a>
        </div>
    </footer>

    <script src="/site.js"></script>
</body>
</html>
